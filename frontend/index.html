<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Учет основных средств</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">
        Система учета основных средств
    </h1>

    <div class="card p-4">

        <h3>Каталог объектов ОС</h3>

        <table class="table table-bordered mt-3">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Стоимость</th>
                    <th>Действие</th>
                </tr>
            </thead>

            <tbody id="objectsTable">
            </tbody>

        </table>

        <div id="status"
             class="alert alert-info mt-3">
            Статус системы...
        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
